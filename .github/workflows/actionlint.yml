name: Workflow Security Scan

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        # pinned commit from actions/checkout v4 series
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install actionlint
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          echo "$GOBIN" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: actionlint -color
