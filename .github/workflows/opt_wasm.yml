name: Opt-In WASM

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dpw4-wasm-nostd:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        # pinned commit from actions/checkout v4 series
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install Rust toolchain (pinned)
        # pinned commit from dtolnay/rust-toolchain stable series
        uses: dtolnay/rust-toolchain@0f44b27771c32bda9f458f75a1e241b09791b331
        with:
          toolchain: 1.91.1
          targets: wasm32-unknown-unknown

      - name: Cache cargo/target
        # pinned commit from Swatinem/rust-cache v2 series
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Mechanical no_std Build Oracle (WASM)
        run: |
          # The ultimate truth of no_std compatibility is whether it compiles for a true #![no_std] target.
          cargo check -p dpw4 --no-default-features --target wasm32-unknown-unknown
